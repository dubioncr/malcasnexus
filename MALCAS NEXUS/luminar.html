<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuminAR | Realidad Aumentada - Malca's Nexus</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-image: url('assets/images/fondo_principal.png'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            background-color: #0b0c10; color: #ffffff; font-family: 'Segoe UI', sans-serif;
            min-height: 100vh; padding-bottom: 50px;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* NAVBAR CONSISTENTE */
        .navbar {
            background-color: rgba(19, 26, 34, 0.85);
            border-bottom: 1px solid rgba(102, 252, 241, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 15px 0;
            backdrop-filter: blur(5px);
            margin-bottom: 40px;
        }
        .navbar .container { display: table; width: 100%; }
        .nav-logo { display: table-cell; vertical-align: middle; font-size: 1.5rem; font-weight: bold; color: #66fcf1; letter-spacing: 1px; text-decoration: none; }
        .nav-menu { display: table-cell; text-align: right; vertical-align: middle; }
        .nav-menu a { color: #ffffff; text-decoration: none; font-size: 0.9rem; font-weight: 600; letter-spacing: 2px; margin-left: 30px; text-transform: uppercase; transition: color 0.3s; }
        .nav-menu a:hover { color: #66fcf1; }

        /* Encabezado */
        .header-ar { text-align: center; padding: 40px 0; }
        .header-ar h1 { color: #66fcf1; font-size: 3rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;}
        
        /* Grilla AR */
        .ar-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 30px; margin-bottom: 80px; 
        }

        .product-card {
            background-color: rgba(31, 40, 51, 0.5);
            border: 1px solid rgba(102, 252, 241, 0.2);
            border-radius: 12px;
            overflow: hidden;
            text-align: center;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease-in-out;
            cursor: pointer;
        }
        .product-image-wrapper { width: 100%; height: 220px; overflow: hidden; background-color: rgba(11, 12, 16, 0.5); }
        .product-card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
        .product-info { padding: 20px; }
        .product-info h3 { color: #ffffff; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }

        /* Efectos Hover */
        .product-card:hover { transform: translateY(-8px); border-color: #66fcf1; background-color: rgba(31, 40, 51, 0.8); box-shadow: 0 10px 25px rgba(102, 252, 241, 0.25); }
        .product-card:hover img { transform: scale(1.1); }
        .product-card:hover h3 { color: #66fcf1; }

        /* Botón PROYECTO LUXIES */
        .luxies-section { text-align: center; padding: 40px; border-top: 2px solid rgba(102, 252, 241, 0.3); }
        .luxies-btn-container { position: relative; display: inline-block; width: 100%; max-width: 500px; height: 120px; border-radius: 60px; overflow: hidden; text-decoration: none; border: 2px solid #66fcf1; transition: transform 0.4s ease, box-shadow 0.4s ease; }
        .luxies-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s ease; }
        .luxies-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 12, 16, 0.8); transition: background 0.5s ease; }
        .luxies-text { position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; height: 100%; font-size: 2rem; font-weight: bold; color: #66fcf1; text-transform: uppercase; letter-spacing: 3px; transition: color 0.3s; }
        .luxies-btn-container:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(102, 252, 241, 0.4); }
        .luxies-btn-container:hover .luxies-video { opacity: 1; }
        .luxies-btn-container:hover .luxies-overlay { background: rgba(11, 12, 16, 0.4); }
        .luxies-btn-container:hover .luxies-text { color: #ffffff; }
    </style>
</head>
<body>

    <!-- BARRA DE NAVEGACIÓN -->
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="nav-logo">MALCA'S NEXUS</a>
            <div class="nav-menu">
                <a href="index.html">Inicio</a>
                <a href="catalogo.html">Catálogo</a>
                <a href="luminar.html" style="color: #ffffff;">LuminAR</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <header class="header-ar">
            <h1>LuminAR</h1>
            <p>Experiencias digitales sobre productos físicos.</p>
        </header>

        <main class="ar-grid">
            <div class="product-card" onclick="location.href='#camisetas-ar'">
                <div class="product-image-wrapper"><img src="assets/images/productos/camisetas_ar.png" alt="Camisetas AR"></div>
                <div class="product-info"><h3>Camisetas AR</h3></div>
            </div>
            <div class="product-card" onclick="location.href='#tazas-ar'">
                <div class="product-image-wrapper"><img src="assets/images/productos/tazas_ar.png" alt="Tazas AR"></div>
                <div class="product-info"><h3>Tazas AR</h3></div>
            </div>
            <div class="product-card" onclick="location.href='#cuadros-ar'">
                <div class="product-image-wrapper"><img src="assets/images/productos/cuadros_ar.png" alt="Cuadros AR"></div>
                <div class="product-info"><h3>Cuadros AR</h3></div>
            </div>
            <div class="product-card" onclick="location.href='#cartas-ar'">
                <div class="product-image-wrapper"><img src="assets/images/productos/cartas_ar.png" alt="Cartas AR"></div>
                <div class="product-info"><h3>Cartas AR</h3></div>
            </div>
        </main>

        <section class="luxies-section">
            <a href="proyecto_luxies.html" class="luxies-btn-container">
                <video class="luxies-video" loop muted playsinline>
                    <source src="assets/videos/luxies_bg.mp4" type="video/mp4">
                </video>
                <div class="luxies-overlay"></div>
                <span class="luxies-text">PROYECTO LUXIES</span>
            </a>
        </section>
    </div>

    <script>
        const btn = document.querySelector('.luxies-btn-container');
        const video = document.querySelector('.luxies-video');
        btn.addEventListener('mouseenter', () => video.play());
        btn.addEventListener('mouseleave', () => { video.pause(); video.currentTime = 0; });
    </script>
</body>
</html>
